services:
  img2md:
    build:
      context: .
    image: img2md-qwen25vl
    gpus: all
    volumes:
      - ./in:/workspace/in
      - ./out:/workspace/out
      - ./hf_cache:/models/hf
      - ./torch_cache:/models/torch
    environment:
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      TORCH_HOME: /models/torch
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_PRESET: ${MODEL_PRESET:-qwen7b}
    command:
      - sh
      - -lc
      - python -m app.img2md --input-dir /workspace/in --output-dir /workspace/out --model-preset "$${MODEL_PRESET}" --combine-output
